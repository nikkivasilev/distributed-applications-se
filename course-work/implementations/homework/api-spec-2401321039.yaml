openapi: 3.0.3

info:
  title: Children's Clothing & Toys Online Store API
  description: |
    REST API specification for an online store selling children's clothing and toys.

    Covers the full set of services that will be implemented as the course project:
    authentication, public catalog browsing, shopping cart, checkout and admin
    management of users, categories, products and orders.

    The specification documents:
      * Full CRUD operations for every domain model (User, Category, Product, Order).
      * Filtering by at least two criteria on every list endpoint.
      * Pagination and sorting on every list endpoint.
      * Input validation matching database constraints (lengths, patterns, ranges, enums).
      * JWT-based authentication and role-based authorization (CUSTOMER, ADMIN).
      * RFC 7807 Problem Details for standardized error responses
        (no raw stack traces are ever returned).
  version: 1.0.0
  contact:
    name: API Support
    email: support@kidsstore.example
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080/api/v1
    description: Local development server

tags:
  - name: Auth
    description: Registration, login, logout, token refresh.
  - name: Products
    description: Public product browsing.
  - name: Categories
    description: Public categories.
  - name: Cart
    description: Authenticated shopping cart.
  - name: Orders
    description: Authenticated checkout and order history.
  - name: Users
    description: Authenticated user profile.
  - name: Admin-Users
    description: Admin user management (CRUD).
  - name: Admin-Categories
    description: Admin category management (CRUD).
  - name: Admin-Products
    description: Admin product management (CRUD).
  - name: Admin-Orders
    description: Admin order management (CRUD).

security: []

paths:

  # ---------- AUTH ----------

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new customer account (User Create)
      description: Creates a new `User` with role CUSTOMER. Email must be unique.
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
      responses:
        '201':
          description: Account created.
          content:
            application/json:
              schema:
                type: object
                required: [user, tokens]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  tokens:
                    $ref: '#/components/schemas/AuthTokens'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
      responses:
        '200':
          description: Authenticated.
          content:
            application/json:
              schema:
                type: object
                required: [user, tokens]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  tokens:
                    $ref: '#/components/schemas/AuthTokens'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  minLength: 20
                  maxLength: 2048
      responses:
        '200':
          description: New tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Log out
      operationId: logoutUser
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logged out.
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ---------- PRODUCTS (public, Read) ----------

  /products:
    get:
      tags: [Products]
      summary: List products (filterable, sortable, paginated)
      description: |
        Filter criteria (all optional, combinable): `search`, `categoryId`,
        `ageGroup`, `gender`, `productType`, `minPrice`, `maxPrice`.
      operationId: listProducts
      security: []
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/pageSizeParam'
        - name: search
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 100
        - name: categoryId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: ageGroup
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AgeGroup'
        - name: gender
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/Gender'
        - name: productType
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ProductType'
        - name: minPrice
          in: query
          required: false
          schema:
            type: number
            minimum: 0
            multipleOf: 0.01
        - name: maxPrice
          in: query
          required: false
          schema:
            type: number
            minimum: 0
            multipleOf: 0.01
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [priceAsc, priceDesc, nameAsc, nameDesc, newest, oldest]
            default: newest
      responses:
        '200':
          description: Paginated products.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProducts'
        '422':
          $ref: '#/components/responses/ValidationError'

  /products/{id}:
    get:
      tags: [Products]
      summary: Get product details
      operationId: getProductById
      security: []
      parameters:
        - $ref: '#/components/parameters/idPathParam'
      responses:
        '200':
          description: Product.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------- CATEGORIES (public, Read) ----------

  /categories:
    get:
      tags: [Categories]
      summary: List categories (filterable, sortable, paginated)
      description: |
        Filter criteria (optional): `search` (matches name), `parentId`
        (use `null` literal string to find root categories).
      operationId: listCategories
      security: []
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/pageSizeParam'
        - name: search
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 100
        - name: parentId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [nameAsc, nameDesc, newest, oldest]
            default: nameAsc
      responses:
        '200':
          description: Paginated categories.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCategories'
        '422':
          $ref: '#/components/responses/ValidationError'

  /categories/{id}:
    get:
      tags: [Categories]
      summary: Get category details
      operationId: getCategoryById
      security: []
      parameters:
        - $ref: '#/components/parameters/idPathParam'
      responses:
        '200':
          description: Category.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------- CART ----------

  /cart:
    get:
      tags: [Cart]
      summary: Get the current user's cart
      operationId: getCart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Cart.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cart/items:
    post:
      tags: [Cart]
      summary: Add an item to the cart
      operationId: addCartItem
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItemAdd'
      responses:
        '200':
          description: Updated cart.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  /cart/items/{itemId}:
    patch:
      tags: [Cart]
      summary: Update quantity of a cart item
      operationId: updateCartItem
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quantity]
              properties:
                quantity:
                  type: integer
                  minimum: 1
                  maximum: 999
      responses:
        '200':
          description: Updated cart.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Cart]
      summary: Remove a cart item
      operationId: removeCartItem
      security:
        - bearerAuth: []
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Updated cart.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------- ORDERS (customer side: Create + Read own) ----------

  /orders:
    post:
      tags: [Orders]
      summary: Place a new order (checkout) — Order Create
      operationId: createOrder
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreate'
      responses:
        '201':
          description: Order created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    get:
      tags: [Orders]
      summary: List the current user's orders (filterable, sortable, paginated)
      description: |
        Filter criteria (optional): `status`, `fromDate`, `toDate`.
      operationId: listOwnOrders
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/pageSizeParam'
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/OrderStatus'
        - name: fromDate
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [newest, oldest, totalAsc, totalDesc]
            default: newest
      responses:
        '200':
          description: Paginated orders.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrders'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Get the current user's order by id
      operationId: getOwnOrderById
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/idPathParam'
      responses:
        '200':
          description: Order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------- USER PROFILE ----------

  /users/me:
    get:
      tags: [Users]
      summary: Get the current user's profile
      operationId: getOwnProfile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Users]
      summary: Update the current user's profile
      operationId: updateOwnProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileUpdate'
      responses:
        '200':
          description: Profile updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  # ---------- ADMIN: USERS (Read all, Read one, Update, Delete) ----------
  # Create is covered by /auth/register; together they form full CRUD.

  /admin/users:
    get:
      tags: [Admin-Users]
      summary: List users (filterable, sortable, paginated)
      description: |
        Filter criteria (optional): `search` (matches email, first/last name),
        `role`, `isActive`.
      operationId: adminListUsers
      security:
        - adminAuth: []
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/pageSizeParam'
        - name: search
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 100
        - name: role
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/UserRole'
        - name: isActive
          in: query
          required: false
          schema:
            type: boolean
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [newest, oldest, emailAsc, emailDesc]
            default: newest
      responses:
        '200':
          description: Paginated users.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUsers'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /admin/users/{id}:
    get:
      tags: [Admin-Users]
      summary: Get a user by id
      operationId: adminGetUser
      security:
        - adminAuth: []
      parameters:
        - $ref: '#/components/parameters/idPathParam'
      responses:
        '200':
          description: User.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Admin-Users]
      summary: Update a user (role, active flag, profile fields)
      operationId: adminUpdateUser
      security:
        - adminAuth: []
      parameters:
        - $ref: '#/components/parameters/idPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserAdminUpdate'
      responses:
        '200':
          description: User updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Admin-Users]
      summary: Delete a user
      description: Soft-deletes the user if they have orders, otherwise removes them.
      operationId: adminDeleteUser
      security:
        - adminAuth: []
      parameters:
        - $ref: '#/components/parameters/idPathParam'
      responses:
        '204':
          description: User deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------- ADMIN: CATEGORIES (full CRUD) ----------

  /admin/categories:
    get:
      tags: [Admin-Categories]
      summary: List categories (admin; filterable, sortable, paginated)
      description: |
        Filter criteria (optional): `search` (matches name), `parentId`.
      operationId: adminListCategories
      security:
        - adminAuth: []
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/pageSizeParam'
        - name: search
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 100
        - name: parentId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [nameAsc, nameDesc, newest, oldest]
            default: nameAsc
      responses:
        '200':
          description: Paginated categories.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCategories'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags: [Admin-Categories]
      summary: Create a category
      operationId: adminCreateCategory
      security:
        - adminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryInput'
      responses:
        '201':
          description: Category created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /admin/categories/{id}:
    get:
      tags: [Admin-Categories]
      summary: Get a category by id (admin)
      operationId: adminGetCategory
      security:
        - adminAuth: []
      parameters:
        - $ref: '#/components/parameters/idPathParam'
      responses:
        '200':
          description: Category.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Admin-Categories]
      summary: Update a category
      operationId: adminUpdateCategory
      security:
        - adminAuth: []
      parameters:
        - $ref: '#/components/parameters/idPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryInput'
      responses:
        '200':
          description: Category updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Admin-Categories]
      summary: Delete a category
      description: A category with assigned products cannot be deleted (409).
      operationId: adminDeleteCategory
      security:
        - adminAuth: []
      parameters:
        - $ref: '#/components/parameters/idPathParam'
      responses:
        '204':
          description: Category deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  # ---------- ADMIN: PRODUCTS (full CRUD) ----------

  /admin/products:
    get:
      tags: [Admin-Products]
      summary: List products (admin; filterable, sortable, paginated)
      description: |
        Filter criteria (optional): `search`, `categoryId`, `isActive`.
        Admin view includes inactive products.
      operationId: adminListProducts
      security:
        - adminAuth: []
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/pageSizeParam'
        - name: search
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 100
        - name: categoryId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: isActive
          in: query
          required: false
          schema:
            type: boolean
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [priceAsc, priceDesc, nameAsc, nameDesc, stockAsc, stockDesc, newest, oldest]
            default: newest
      responses:
        '200':
          description: Paginated products.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProducts'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
    post:
      tags: [Admin-Products]
      summary: Create a product
      operationId: adminCreateProduct
      security:
        - adminAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '201':
          description: Product created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /admin/products/{id}:
    get:
      tags: [Admin-Products]
      summary: Get a product by id (admin)
      operationId: adminGetProduct
      security:
        - adminAuth: []
      parameters:
        - $ref: '#/components/parameters/idPathParam'
      responses:
        '200':
          description: Product.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Admin-Products]
      summary: Update a product
      description: All fields are optional; only provided fields are updated.
      operationId: adminUpdateProduct
      security:
        - adminAuth: []
      parameters:
        - $ref: '#/components/parameters/idPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        '200':
          description: Product updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Admin-Products]
      summary: Delete a product
      operationId: adminDeleteProduct
      security:
        - adminAuth: []
      parameters:
        - $ref: '#/components/parameters/idPathParam'
      responses:
        '204':
          description: Product deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------- ADMIN: ORDERS (Read all, Read one, Update, Delete) ----------
  # Create is covered by the customer POST /orders.

  /admin/orders:
    get:
      tags: [Admin-Orders]
      summary: List all orders (filterable, sortable, paginated)
      description: |
        Filter criteria (optional): `status`, `userId`, `fromDate`, `toDate`,
        `minTotal`, `maxTotal`.
      operationId: adminListOrders
      security:
        - adminAuth: []
      parameters:
        - $ref: '#/components/parameters/pageParam'
        - $ref: '#/components/parameters/pageSizeParam'
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/OrderStatus'
        - name: userId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: fromDate
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: toDate
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: minTotal
          in: query
          required: false
          schema:
            type: number
            minimum: 0
            multipleOf: 0.01
        - name: maxTotal
          in: query
          required: false
          schema:
            type: number
            minimum: 0
            multipleOf: 0.01
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [newest, oldest, totalAsc, totalDesc]
            default: newest
      responses:
        '200':
          description: Paginated orders.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrders'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'

  /admin/orders/{id}:
    get:
      tags: [Admin-Orders]
      summary: Get any order by id
      operationId: adminGetOrder
      security:
        - adminAuth: []
      parameters:
        - $ref: '#/components/parameters/idPathParam'
      responses:
        '200':
          description: Order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Admin-Orders]
      summary: Update an order (status, tracking number, notes)
      operationId: adminUpdateOrder
      security:
        - adminAuth: []
      parameters:
        - $ref: '#/components/parameters/idPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderAdminUpdate'
      responses:
        '200':
          description: Order updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Invalid status transition.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Admin-Orders]
      summary: Delete an order
      description: |
        Hard-delete is restricted to orders in `CANCELLED` status (e.g. for
        GDPR cleanup). Other orders return 409.
      operationId: adminDeleteOrder
      security:
        - adminAuth: []
      parameters:
        - $ref: '#/components/parameters/idPathParam'
      responses:
        '204':
          description: Order deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT access token. Send as `Authorization: Bearer <token>`."
    adminAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Same JWT as `bearerAuth`, but token must carry `role: ADMIN`."

  parameters:
    pageParam:
      name: page
      in: query
      description: 1-based page number.
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    pageSizeParam:
      name: pageSize
      in: query
      description: Items per page.
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    idPathParam:
      name: id
      in: path
      required: true
      description: Resource UUID.
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Authentication required or token invalid.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Forbidden:
      description: Authenticated but not allowed.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    NotFound:
      description: Resource not found.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Conflict:
      description: Conflict with current state (e.g. duplicate, in use).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    ValidationError:
      description: Request body or parameters failed validation.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ValidationProblemDetails'

  schemas:

    # ----- Common: RFC 7807 Problem Details -----

    ProblemDetails:
      type: object
      description: |
        Standardized error response per RFC 7807 (Problem Details for HTTP APIs).
        Served with media type `application/problem+json`.
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
          default: about:blank
          description: A URI reference identifying the problem type.
          example: https://kidsstore.example/problems/resource-not-found
        title:
          type: string
          maxLength: 200
          description: A short, human-readable summary of the problem type.
          example: Resource not found
        status:
          type: integer
          format: int32
          minimum: 100
          maximum: 599
          example: 404
        detail:
          type: string
          maxLength: 1000
          description: Human-readable explanation specific to this occurrence.
          example: Product with id 5cb3... does not exist.
        instance:
          type: string
          format: uri-reference
          maxLength: 500
          description: URI reference identifying the specific occurrence.
          example: /api/v1/products/5cb3...
        code:
          type: string
          maxLength: 100
          description: Application-specific error code (extension member).
          example: RESOURCE_NOT_FOUND
        timestamp:
          type: string
          format: date-time
          description: When the error occurred (extension member).

    ValidationProblemDetails:
      description: |
        Extension of `ProblemDetails` for input-validation failures.
        `errors` lists per-field violations.
      allOf:
        - $ref: '#/components/schemas/ProblemDetails'
        - type: object
          required: [errors]
          properties:
            errors:
              type: array
              items:
                type: object
                required: [field, message]
                properties:
                  field:
                    type: string
                    maxLength: 200
                    example: email
                  message:
                    type: string
                    maxLength: 500
                    example: must be a valid email address

    PaginationMeta:
      type: object
      required: [page, pageSize, totalItems, totalPages]
      properties:
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
        totalItems:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0

    # ----- Enums -----

    UserRole:
      type: string
      enum: [CUSTOMER, ADMIN]

    OrderStatus:
      type: string
      enum: [PENDING, CONFIRMED, PROCESSING, SHIPPED, DELIVERED, CANCELLED]

    PaymentMethod:
      type: string
      enum: [CARD, CASH_ON_DELIVERY, BANK_TRANSFER]

    AgeGroup:
      type: string
      enum:
        - NEWBORN_0_3M
        - INFANT_3_12M
        - TODDLER_1_3Y
        - CHILD_3_6Y
        - CHILD_6_10Y
        - PRETEEN_10_14Y

    Gender:
      type: string
      enum: [BOY, GIRL, UNISEX]

    ProductType:
      type: string
      enum: [CLOTHING, TOY, ACCESSORY]

    Currency:
      type: string
      enum: [BGN, EUR, USD]

    # ----- User & Auth -----

    User:
      type: object
      required: [id, email, firstName, lastName, role, isActive, createdAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
          maxLength: 255
        firstName:
          type: string
          minLength: 1
          maxLength: 100
        lastName:
          type: string
          minLength: 1
          maxLength: 100
        phone:
          type: string
          pattern: '^\+?[0-9 \-]{7,20}$'
          nullable: true
        role:
          $ref: '#/components/schemas/UserRole'
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    UserRegister:
      type: object
      required: [email, password, firstName, lastName]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
          maxLength: 128
          pattern: '^(?=.*[A-Za-z])(?=.*\d).+$'
          description: At least 8 chars, must contain a letter and a digit.
        firstName:
          type: string
          minLength: 1
          maxLength: 100
        lastName:
          type: string
          minLength: 1
          maxLength: 100

    UserLogin:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 1
          maxLength: 128

    UserProfileUpdate:
      type: object
      description: Fields a user may update on their own profile.
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 100
        lastName:
          type: string
          minLength: 1
          maxLength: 100
        phone:
          type: string
          pattern: '^\+?[0-9 \-]{7,20}$'

    UserAdminUpdate:
      type: object
      description: Fields an admin may update on any user.
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 100
        lastName:
          type: string
          minLength: 1
          maxLength: 100
        phone:
          type: string
          pattern: '^\+?[0-9 \-]{7,20}$'
        role:
          $ref: '#/components/schemas/UserRole'
        isActive:
          type: boolean

    AuthTokens:
      type: object
      required: [accessToken, refreshToken, expiresIn]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          minimum: 1
          description: Access token lifetime in seconds.

    # ----- Product & Category -----

    Product:
      type: object
      required:
        - id
        - name
        - description
        - price
        - currency
        - categoryId
        - productType
        - ageGroup
        - gender
        - stockQuantity
        - isActive
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 5000
        price:
          type: number
          minimum: 0
          multipleOf: 0.01
        currency:
          $ref: '#/components/schemas/Currency'
        categoryId:
          type: string
          format: uuid
        productType:
          $ref: '#/components/schemas/ProductType'
        ageGroup:
          $ref: '#/components/schemas/AgeGroup'
        gender:
          $ref: '#/components/schemas/Gender'
        sizes:
          type: array
          items:
            type: string
            maxLength: 20
          maxItems: 30
        imageUrl:
          type: string
          format: uri
          maxLength: 1024
        stockQuantity:
          type: integer
          minimum: 0
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    ProductInput:
      type: object
      description: |
        Used for both create and update. On `POST /admin/products` the listed
        `required` fields must be present. On `PATCH /admin/products/{id}`
        any subset may be provided.
      required:
        - name
        - description
        - price
        - currency
        - categoryId
        - productType
        - ageGroup
        - gender
        - stockQuantity
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 5000
        price:
          type: number
          minimum: 0
          multipleOf: 0.01
        currency:
          $ref: '#/components/schemas/Currency'
        categoryId:
          type: string
          format: uuid
        productType:
          $ref: '#/components/schemas/ProductType'
        ageGroup:
          $ref: '#/components/schemas/AgeGroup'
        gender:
          $ref: '#/components/schemas/Gender'
        sizes:
          type: array
          items:
            type: string
            maxLength: 20
          maxItems: 30
        imageUrl:
          type: string
          format: uri
          maxLength: 1024
        stockQuantity:
          type: integer
          minimum: 0
        isActive:
          type: boolean

    Category:
      type: object
      required: [id, name, slug, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 100
        slug:
          type: string
          pattern: '^[a-z0-9]+(-[a-z0-9]+)*$'
          maxLength: 100
        description:
          type: string
          maxLength: 1000
        parentId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time

    CategoryInput:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        slug:
          type: string
          pattern: '^[a-z0-9]+(-[a-z0-9]+)*$'
          maxLength: 100
        description:
          type: string
          maxLength: 1000
        parentId:
          type: string
          format: uuid
          nullable: true

    # ----- Cart -----

    CartItem:
      type: object
      required: [id, productId, productName, quantity, unitPrice, lineTotal]
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        productName:
          type: string
          maxLength: 100
        size:
          type: string
          maxLength: 20
        quantity:
          type: integer
          minimum: 1
          maximum: 999
        unitPrice:
          type: number
          minimum: 0
          multipleOf: 0.01
        lineTotal:
          type: number
          minimum: 0
          multipleOf: 0.01

    CartItemAdd:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
          maximum: 999
        size:
          type: string
          maxLength: 20

    Cart:
      type: object
      required: [id, userId, items, total, currency]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        total:
          type: number
          minimum: 0
          multipleOf: 0.01
        currency:
          $ref: '#/components/schemas/Currency'

    # ----- Order -----

    OrderItem:
      type: object
      required: [productId, productName, quantity, unitPrice, lineTotal]
      properties:
        productId:
          type: string
          format: uuid
        productName:
          type: string
          maxLength: 100
        size:
          type: string
          maxLength: 20
        quantity:
          type: integer
          minimum: 1
        unitPrice:
          type: number
          minimum: 0
          multipleOf: 0.01
        lineTotal:
          type: number
          minimum: 0
          multipleOf: 0.01

    Order:
      type: object
      required:
        - id
        - userId
        - items
        - status
        - paymentMethod
        - total
        - currency
        - shippingAddress
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItem'
        status:
          $ref: '#/components/schemas/OrderStatus'
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        total:
          type: number
          minimum: 0
          multipleOf: 0.01
        currency:
          $ref: '#/components/schemas/Currency'
        shippingAddress:
          type: string
          minLength: 1
          maxLength: 500
          description: Free-text shipping address (recipient, street, city, postal code, country).
        trackingNumber:
          type: string
          maxLength: 100
          nullable: true
        notes:
          type: string
          maxLength: 500
          nullable: true
        createdAt:
          type: string
          format: date-time

    OrderCreate:
      type: object
      required: [shippingAddress, paymentMethod]
      properties:
        shippingAddress:
          type: string
          minLength: 1
          maxLength: 500
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'

    OrderAdminUpdate:
      type: object
      description: Fields an admin may update on an order.
      properties:
        status:
          $ref: '#/components/schemas/OrderStatus'
        trackingNumber:
          type: string
          maxLength: 100
        notes:
          type: string
          maxLength: 500

    # ----- Paginated wrappers -----

    PaginatedProducts:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    PaginatedCategories:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Category'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    PaginatedOrders:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Order'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'

    PaginatedUsers:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'
